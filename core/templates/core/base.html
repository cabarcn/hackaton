<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Licitaciones IA{% endblock %}</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-white border-bottom mb-3">
  <div class="container">
    <a class="navbar-brand" href="{% url 'home' %}">Licitaciones IA</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        {% if request.user.is_authenticated %}
          <li class="nav-item"><a class="nav-link" href="{% url 'proposito' %}">Nueva</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'renca_nueva' %}">Formulario RENCA</a></li>
        {% endif %}
      </ul>
      <div class="ms-auto">
        {% if request.user.is_authenticated %}
          <a class="btn btn-outline-secondary btn-sm" href="{% url 'logout' %}">Salir</a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>



<main class="container">
  {% for m in messages %}
    <div class="alert alert-{{ m.tags }} mb-2">{{ m }}</div>
  {% endfor %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
